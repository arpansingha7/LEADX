<!-- @dsCard group="Colors" viewport="700x196" subtitle="Agent accent families — solid (light) over tint (dark)" name="Accent palette" -->
<!DOCTYPE html><html data-pd-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font-sans);padding:20px}
  .row{display:flex;gap:10px}
  .sw{flex:1;display:flex;flex-direction:column;gap:6px}
  .chip{height:46px;border-radius:var(--radius-md);border:1px solid var(--border-strong)}
  .chip.t{height:22px}
  .lbl{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.08em;color:var(--text-label)}
  .nm{font-size:12px;font-weight:600;color:var(--text-heading)}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--pd-blue)"></div><div class="chip t" style="background:var(--pd-blue-200)"></div><span class="nm">Blue</span><span class="lbl">2563EB · 7CB8F7</span></div>
    <div class="sw"><div class="chip" style="background:var(--pd-emerald)"></div><div class="chip t" style="background:var(--pd-emerald-200)"></div><span class="nm">Emerald</span><span class="lbl">10B981 · 6EE7B7</span></div>
    <div class="sw"><div class="chip" style="background:var(--pd-violet)"></div><div class="chip t" style="background:var(--pd-violet-200)"></div><span class="nm">Violet</span><span class="lbl">7C4DEC · C4B5FD</span></div>
    <div class="sw"><div class="chip" style="background:var(--pd-amber)"></div><div class="chip t" style="background:var(--pd-amber-200)"></div><span class="nm">Amber</span><span class="lbl">E0840A · FCD34D</span></div>
    <div class="sw"><div class="chip" style="background:var(--pd-rose)"></div><div class="chip t" style="background:var(--pd-rose-200)"></div><span class="nm">Rose</span><span class="lbl">E03C8C · F9A8D4</span></div>
    <div class="sw"><div class="chip" style="background:var(--pd-cyan)"></div><div class="chip t" style="background:var(--pd-cyan-200)"></div><span class="nm">Cyan</span><span class="lbl">0BA3C0 · 67E8F9</span></div>
  </div>
</body></html>
