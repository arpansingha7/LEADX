<!-- @dsCard group="Brand" viewport="700x200" subtitle="Predixion wordmark — white on dark, auto-inverts on light" name="Logo" -->
<!DOCTYPE html><html data-pd-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);display:flex}
  .pane{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:28px 0;height:200px;box-sizing:border-box}
  .dark{background:var(--pd-black)}
  .light{background:var(--pd-paper)}
  img{height:56px;width:auto}
  .lbl{font-family:var(--font-mono);font-size:9px;letter-spacing:.16em;color:var(--text-label)}
</style></head>
<body>
  <div class="pane dark"><img src="../assets/predixion-logo.png" alt="Predixion AI"><span class="lbl">ON DARK</span></div>
  <div class="pane light"><img src="../assets/predixion-logo.png" alt="Predixion AI" style="filter:invert(1)"><span class="lbl" style="color:#85858F">ON LIGHT · invert(1)</span></div>
</body></html>
