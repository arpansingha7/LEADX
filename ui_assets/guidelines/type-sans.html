<!-- @dsCard group="Type" viewport="700x230" subtitle="Helvetica Neue — headline, agent names, body" name="Sans · scale" -->
<!DOCTYPE html><html data-pd-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font-sans);padding:22px;display:flex;flex-direction:column;gap:14px}
  .h1{font-size:var(--text-4xl);font-weight:var(--weight-semibold);color:var(--text-strong);letter-spacing:var(--tracking-tight);line-height:var(--leading-tight)}
  .h3{font-size:var(--text-3xl);font-weight:var(--weight-semibold);color:var(--text-heading)}
  .lead{font-size:var(--text-lg);color:var(--text-muted);line-height:var(--leading-normal)}
  .body{font-size:var(--text-base);color:var(--text-soft);line-height:var(--leading-relaxed)}
  .tag{font-family:var(--font-mono);font-size:9px;letter-spacing:.1em;color:var(--text-label)}
</style></head>
<body>
  <div><div class="tag">30 / 600 · HEADLINE</div><div class="h1">Choose an agent to start a conversation</div></div>
  <div><div class="tag">25 / 600 · AGENT NAME</div><div class="h3">Aria</div></div>
  <div><div class="tag">15 / 400 · LEAD</div><div class="lead">Talk to it live, exactly the way your customers would.</div></div>
  <div><div class="tag">14 / 400 · BODY</div><div class="body">Empathetic, compliant outreach for early-stage delinquencies.</div></div>
</body></html>
