<!-- @dsCard group="Colors" viewport="700x150" subtitle="Light theme surfaces & semantic status colors" name="Neutrals · Light + Status" -->
<!DOCTYPE html><html data-pd-theme="light"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font-sans);padding:20px}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
  .cell{display:flex;flex-direction:column;gap:5px}
  .sw{height:46px;border-radius:var(--radius-md);border:1px solid var(--border)}
  .lbl{font-family:var(--font-mono);font-size:9px;letter-spacing:.04em;color:var(--text-label)}
  .nm{font-size:10.5px;color:var(--text-soft)}
</style></head>
<body>
  <div class="grid">
    <div class="cell"><div class="sw" style="background:var(--pd-paper)"></div><span class="nm">paper</span><span class="lbl">F6F7FA</span></div>
    <div class="cell"><div class="sw" style="background:var(--pd-white)"></div><span class="nm">surface</span><span class="lbl">FFFFFF</span></div>
    <div class="cell"><div class="sw" style="background:var(--pd-text-700)"></div><span class="nm">text</span><span class="lbl">1B1B22</span></div>
    <div class="cell"><div class="sw" style="background:var(--pd-text-400)"></div><span class="nm">muted</span><span class="lbl">63636E</span></div>
    <div class="cell"><div class="sw" style="background:var(--pd-success)"></div><span class="nm">success</span><span class="lbl">3ECF8E</span></div>
    <div class="cell"><div class="sw" style="background:var(--pd-warning)"></div><span class="nm">warning</span><span class="lbl">F0B35B</span></div>
    <div class="cell"><div class="sw" style="background:var(--pd-danger)"></div><span class="nm">danger</span><span class="lbl">F43F5E</span></div>
  </div>
</body></html>
