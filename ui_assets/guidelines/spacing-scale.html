<!-- @dsCard group="Spacing" viewport="700x150" subtitle="4px base grid — gaps, padding, stack rhythm" name="Spacing scale" -->
<!DOCTYPE html><html data-pd-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font-sans);padding:22px}
  .row{display:flex;align-items:flex-end;gap:14px}
  .cell{display:flex;flex-direction:column;align-items:center;gap:8px}
  .bar{background:var(--accent);width:100%;border-radius:3px;opacity:.85}
  .lbl{font-family:var(--font-mono);font-size:9px;letter-spacing:.04em;color:var(--text-label)}
  .cell.w4{width:8px}.cell.w6{width:12px}.cell.w8{width:16px}.cell.w10{width:20px}.cell.w12{width:24px}.cell.w16{width:32px}.cell.w20{width:40px}.cell.w24{width:48px}
</style></head>
<body>
  <div class="row">
    <div class="cell w4"><div class="bar" style="height:8px"></div><span class="lbl">4</span></div>
    <div class="cell w6"><div class="bar" style="height:12px"></div><span class="lbl">6</span></div>
    <div class="cell w8"><div class="bar" style="height:16px"></div><span class="lbl">8</span></div>
    <div class="cell w10"><div class="bar" style="height:20px"></div><span class="lbl">10</span></div>
    <div class="cell w12"><div class="bar" style="height:24px"></div><span class="lbl">12</span></div>
    <div class="cell w16"><div class="bar" style="height:32px"></div><span class="lbl">16</span></div>
    <div class="cell w20"><div class="bar" style="height:40px"></div><span class="lbl">20</span></div>
    <div class="cell w24"><div class="bar" style="height:48px"></div><span class="lbl">24</span></div>
  </div>
</body></html>
