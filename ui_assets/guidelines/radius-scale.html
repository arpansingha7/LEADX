<!-- @dsCard group="Spacing" viewport="700x150" subtitle="Corner radii — soft, pill only for chips/toggles" name="Radius scale" -->
<!DOCTYPE html><html data-pd-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font-sans);padding:22px}
  .row{display:flex;gap:14px;align-items:flex-end}
  .cell{display:flex;flex-direction:column;align-items:center;gap:8px}
  .box{width:62px;height:48px;background:var(--surface);border:1px solid var(--border-strong);box-shadow:var(--shadow-card-inner)}
  .lbl{font-family:var(--font-mono);font-size:9px;letter-spacing:.04em;color:var(--text-label)}
  .nm{font-size:10.5px;color:var(--text-soft)}
</style></head>
<body>
  <div class="row">
    <div class="cell"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="nm">sm</span><span class="lbl">9</span></div>
    <div class="cell"><div class="box" style="border-radius:var(--radius-md)"></div><span class="nm">md</span><span class="lbl">10</span></div>
    <div class="cell"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="nm">lg</span><span class="lbl">14</span></div>
    <div class="cell"><div class="box" style="border-radius:var(--radius-xl)"></div><span class="nm">xl</span><span class="lbl">18</span></div>
    <div class="cell"><div class="box" style="border-radius:var(--radius-2xl)"></div><span class="nm">2xl</span><span class="lbl">20</span></div>
    <div class="cell"><div class="box" style="border-radius:var(--radius-pill);width:80px"></div><span class="nm">pill</span><span class="lbl">999</span></div>
    <div class="cell"><div class="box" style="border-radius:var(--radius-circle);width:48px"></div><span class="nm">circle</span><span class="lbl">50%</span></div>
  </div>
</body></html>
