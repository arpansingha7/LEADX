<!-- @dsCard group="Type" viewport="700x180" subtitle="IBM Plex Mono — uppercase, tracked labels & metadata" name="Mono · labels" -->
<!DOCTYPE html><html data-pd-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font-mono);padding:22px;display:flex;flex-direction:column;gap:16px}
  .eyebrow{font-size:var(--text-xs);letter-spacing:var(--tracking-eyebrow);color:var(--text-label)}
  .badge{display:inline-block;font-size:var(--text-2xs);letter-spacing:var(--tracking-label);color:var(--accent);border:1px solid color-mix(in srgb, var(--accent) 28%, transparent);background:color-mix(in srgb, var(--accent) 12%, transparent);border-radius:var(--radius-pill);padding:5px 12px}
  .timer{font-size:13px;letter-spacing:.12em;color:var(--accent)}
  .micro{font-size:var(--text-2xs);letter-spacing:var(--tracking-label);color:var(--text-label-2)}
  .row{display:flex;align-items:center;gap:14px}
</style></head>
<body>
  <div class="eyebrow">LIVE VOICE DEMO</div>
  <div class="row"><span class="badge">COLLECTIONS &amp; RECOVERY</span><span class="timer">1:52</span></div>
  <div class="micro">PRESENTED FOR · ANALYZING CONVERSATION… · BEFORE YOU START</div>
</body></html>
