<!-- @dsCard group="Colors" viewport="700x180" subtitle="Dark theme — warm near-black surfaces & neutral ramp" name="Neutrals · Dark" -->
<!DOCTYPE html><html data-pd-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font-sans);padding:20px}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
  .cell{display:flex;flex-direction:column;gap:5px}
  .sw{height:48px;border-radius:var(--radius-md);border:1px solid var(--border)}
  .lbl{font-family:var(--font-mono);font-size:9px;letter-spacing:.04em;color:var(--text-label)}
  .nm{font-size:10.5px;color:var(--text-soft)}
</style></head>
<body>
  <div class="grid">
    <div class="cell"><div class="sw" style="background:var(--pd-black)"></div><span class="nm">bg</span><span class="lbl">08080B</span></div>
    <div class="cell"><div class="sw" style="background:var(--pd-ink-850)"></div><span class="nm">panel</span><span class="lbl">0D0D11</span></div>
    <div class="cell"><div class="sw" style="background:var(--pd-ink-800)"></div><span class="nm">input</span><span class="lbl">131318</span></div>
    <div class="cell"><div class="sw" style="background:var(--pd-ink-700)"></div><span class="nm">charcoal</span><span class="lbl">2B2B33</span></div>
    <div class="cell"><div class="sw" style="background:var(--pd-gray-500)"></div><span class="nm">label</span><span class="lbl">6E6E78</span></div>
    <div class="cell"><div class="sw" style="background:var(--pd-gray-300)"></div><span class="nm">muted</span><span class="lbl">9A9AA3</span></div>
    <div class="cell"><div class="sw" style="background:var(--pd-gray-200)"></div><span class="nm">soft</span><span class="lbl">C9C9D1</span></div>
    <div class="cell"><div class="sw" style="background:var(--pd-gray-100)"></div><span class="nm">text</span><span class="lbl">E9E9EE</span></div>
    <div class="cell"><div class="sw" style="background:var(--pd-white-200)"></div><span class="nm">heading</span><span class="lbl">EDEDF2</span></div>
    <div class="cell"><div class="sw" style="background:var(--pd-white-100)"></div><span class="nm">strong</span><span class="lbl">F1F1F5</span></div>
    <div class="cell"><div class="sw" style="background:var(--pd-white)"></div><span class="nm">white</span><span class="lbl">FFFFFF</span></div>
    <div class="cell"><div class="sw" style="background:var(--pd-ink-900)"></div><span class="nm">ink</span><span class="lbl">0A0A0D</span></div>
  </div>
</body></html>
