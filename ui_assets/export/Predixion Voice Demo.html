  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

t:34px;border-radius:50%;border:2px solid rgba(124,184,247,.16);border-top-color:#7CB8F7;animation:pdSpin .9s linear infinite\"><\u002Fdiv>\n        <p class=\"mono\" style=\"margin:0;color:#6E6E78;font-size:11px;letter-spacing:.2em\">INITIALIZING DEMO…<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ERROR -->\n    <sc-if value=\"{{ isError }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"width:100%;max-width:400px;margin-top:90px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:38px 32px;display:flex;flex-direction:column;align-items:center;gap:12px;text-align:center\">\n        <div style=\"width:46px;height:46px;border-radius:12px;background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.35);display:flex;align-items:center;justify-content:center;color:#fda4af;font-size:22px;font-weight:700\">!<\u002Fdiv>\n        <h2 style=\"margin:6px 0 0;font-size:18px;font-weight:600;color:#EDEDF2\">This demo is unavailable<\u002Fh2>\n        <p style=\"margin:0 0 6px;font-size:13.5px;color:#9A9AA3;line-height:1.6\">We couldn't reach the demo right now. Please check your link or try again in a moment.<\u002Fp>\n        <button class=\"pd-sec\" onclick=\"{{ retry }}\">Try again<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- PASSCODE -->\n    <sc-if value=\"{{ isPasscode }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"width:100%;max-width:392px;margin-top:80px;background:#0D0D11;border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:36px 32px;display:flex;flex-direction:column;align-items:center;gap:14px;animation:pdRise .4s ease both\">\n        <div style=\"width:50px;height:50px;border-radius:13px;background:rgba(124,184,247,.1);border:1px solid rgba(124,184,247,.28);display:flex;align-items:center;justify-content:center;color:#7CB8F7;font-size:24px;font-weight:600\">α<\u002Fdiv>\n        <p class=\"mono\" style=\"margin:6px 0 0;font-size:10px;letter-spacing:.22em;color:#6E6E78\">PRIVATE ACCESS<\u002Fp>\n        <h1 style=\"margin:0;font-size:21px;font-weight:600;color:#EDEDF2;text-align:center\">Enter your passcode<\u002Fh1>\n        <p style=\"margin:0 0 10px;color:#9A9AA3;font-size:13.5px;text-align:center;line-height:1.55\">Use the passcode you were given to start the conversation.<\u002Fp>\n        <input type=\"password\" placeholder=\"Passcode\" value=\"{{ passcode }}\" onchange=\"{{ onPasscode }}\" onkeydown=\"{{ onPasscodeKey }}\" class=\"mono\" style=\"width:100%;background:#131318;border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:13px 15px;color:#E9E9EE;font-size:15px;outline:none;transition:all .15s;text-align:center;letter-spacing:.35em\">\n        <sc-if value=\"{{ passcodeError }}\" hint-placeholder-val=\"{{ false }}\">\n          <p class=\"mono\" style=\"margin:0;font-size:11px;letter-spacing:.05em;color:#fda4af;background:rgba(244,63,94,.08);border:1px solid rgba(244,63,94,.25);border-radius:8px;padding:9px 14px;width:100%;text-align:center\">INCORRECT PASSCODE — TRY AGAIN<\u002Fp>\n        <\u002Fsc-if>\n        <button class=\"pd-prim\" onclick=\"{{ submitPasscode }}\" style=\"width:100%\">Continue\n          <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg>\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ═════════ LANDING — agent cards ═════════ -->\n    <sc-if value=\"{{ isLanding }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"width:100%;max-width:1040px;display:flex;flex-direction:column\">\n        <div class=\"pd-hero\" style=\"padding:44px 4px 30px;display:flex;justify-content:space-between;align-items:flex-start;gap:24px\">\n          <div style=\"min-width:0\">\n            <p class=\"mono\" style=\"margin:0 0 12px;font-size:10.5px;letter-spacing:.22em;color:#6E6E78\">LIVE VOICE DEMO<\u002Fp>\n            <h1 class=\"pd-h1\" style=\"margin:0;font-size:30px;font-weight:600;color:#F1F1F5;letter-spacing:-.01em;line-height:1.15\">Choose an agent to start a conversation<\u002Fh1>\n            <p class=\"pd-sub\" style=\"margin:12px 0 0;font-size:15px;color:#9A9AA3;line-height:1.6;max-width:560px\">Pick a Predixion voice agent below and talk to it live, exactly the way your customers would.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"flex:none;display:flex;align-items:center;gap:2px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:999px;padding:3px;margin-top:4px\">\n            <a class=\"pd-theme\" href=\"Predixion%20Voice%20Demo%20-%20Light.html\" onclick=\"{{ goTheme }}\" title=\"Switch to light mode\" style=\"display:flex;align-items:center;justify-content:center;width:32px;height:28px;border-radius:999px;background:transparent;border:none;cursor:pointer;color:#6E6E78;transition:color .15s;text-decoration:none\">\n              <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"4\"><\u002Fcircle><path d=\"M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4\"><\u002Fpath><\u002Fsvg>\n            <\u002Fa>\n            <span title=\"Dark\" style=\"display:flex;align-items:center;justify-content:center;width:32px;height:28px;border-radius:999px;background:rgba(255,255,255,.12);color:#EDEDF2\">\n              <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z\"><\u002Fpath><\u002Fsvg>\n            <\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"pd-grid\" style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(248px,1fr));gap:18px\">\n          <sc-for list=\"{{ agentCards }}\" as=\"c\" hint-placeholder-count=\"3\">\n            <div class=\"pd-card\" style=\"background:rgba(255,255,255,.018);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:30px 24px 26px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:14px\">\n              <div class=\"{{ c.orbClass }}\"><div class=\"r1\"><\u002Fdiv><div class=\"r2\"><\u002Fdiv><div class=\"sphere\"><div class=\"bA\"><\u002Fdiv><div class=\"bB\"><\u002Fdiv><div class=\"bC\"><\u002Fdiv><div class=\"sheen\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;align-items:center;gap:8px;margin-top:4px\">\n                <h2 style=\"margin:0;font-size:20px;font-weight:600;color:#EDEDF2\">{{ c.name }}<\u002Fh2>\n                <span class=\"mono\" style=\"font-size:9.5px;font-weight:500;letter-spacing:.14em;padding:4px 11px;border-radius:999px;background:{{ c.chipBg }};color:{{ c.accent }};border:1px solid {{ c.chipBorder }};white-space:nowrap\">{{ c.objectiveU }}<\u002Fspan>\n              <\u002Fdiv>\n              <p style=\"margin:2px 0 0;flex:1;font-size:13px;color:#9A9AA3;line-height:1.6;text-wrap:pretty\">{{ c.desc }}<\u002Fp>\n              <button class=\"pd-talk\" onclick=\"{{ c.onTalk }}\" style=\"color:{{ c.accent }};margin-top:6px\">\n                <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 2a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z\"><\u002Fpath><path d=\"M19 10v1a7 7 0 0 1-14 0v-1M12 18v4\"><\u002Fpath><\u002Fsvg>\n                Talk to {{ c.name }}\n              <\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;align-items:center;gap:13px;padding:42px 0 4px\">\n          <p class=\"mono\" style=\"margin:0;font-size:10px;letter-spacing:.14em;color:#56565E\">AI VOICE AGENTS FOR YOUR BUSINESS?<\u002Fp>\n          <button class=\"pd-sec\" onclick=\"{{ openContact }}\">Contact us\n            <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg>\n          <\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ═════════ CALL VIEW ═════════ -->\n    <sc-if value=\"{{ isCall }}\" hint-placeholder-val=\"{{ false }}\">\n      <div class=\"{{ callWrapClass }}\" style=\"width:100%;display:flex;gap:18px;margin-top:36px\">\n\n        <div class=\"pd-callcard pd-callcol\" style=\"position:relative;width:100%;background:rgba(255,255,255,.018);border:1px solid rgba(255,255,255,.07);border-radius:20px;padding:24px 30px 32px;display:flex;flex-direction:column;align-items:center\">\n\n          <div class=\"pd-orb-wrap\"><div class=\"{{ orbClass }}\"><div class=\"r1\"><\u002Fdiv><div class=\"r2\"><\u002Fdiv><div class=\"sphere\"><div class=\"bA\"><\u002Fdiv><div class=\"bB\"><\u002Fdiv><div class=\"bC\"><\u002Fdiv><div class=\"sheen\"><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n\n          <div style=\"text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px;margin-top:2px\">\n            <h2 style=\"margin:0;font-size:25px;font-weight:600;color:#EDEDF2;letter-spacing:.005em\">{{ agentName }}<\u002Fh2>\n            <span class=\"mono\" style=\"font-size:10px;font-weight:500;letter-spacing:.16em;padding:5px 12px;border-radius:999px;background:{{ chipBg }};color:{{ accent }};border:1px solid {{ chipBorder }};white-space:nowrap\">{{ agentObjectiveU }}<\u002Fspan>\n          <\u002Fdiv>\n\n          <!-- LIVE: orb only, no transcript -->\n          <sc-if value=\"{{ isLive }}\" hint-placeholder-val=\"{{ false }}\">\n            <p class=\"mono\" style=\"margin:16px 0 0;font-size:10.5px;letter-spacing:.16em;color:#6E6E78;height:14px;white-space:nowrap\">{{ liveStatusU }}<\u002Fp>\n            <div style=\"display:flex;flex-direction:column;align-items:center;gap:16px;width:100%;margin-top:18px\">\n              <div class=\"mono\" style=\"display:flex;align-items:center;gap:9px;font-size:13px;color:#7CB8F7;font-weight:500;letter-spacing:.12em\">\n                <span style=\"width:7px;height:7px;border-radius:50%;background:#3ECF8E;box-shadow:0 0 9px #3ECF8E;animation:pdBlink 1.3s ease-in-out infinite\"><\u002Fspan>\n                {{ timer }}\n              <\u002Fdiv>\n              <button class=\"pd-end\" onclick=\"{{ endCall }}\">\n                <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\"><path d=\"M18 6 6 18M6 6l12 12\"><\u002Fpath><\u002Fsvg>\n                End call\n              <\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- ENDED: summary only -->\n          <sc-if value=\"{{ isEnded }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"width:100%;background:#0D0D11;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:20px;margin-top:24px;animation:pdRise .4s ease both\">\n              <div class=\"mono\" style=\"display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:10.5px;letter-spacing:.18em;color:#6E6E78\">\n                <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#7CB8F7\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z\"><\u002Fpath><path d=\"M14 2v6h6M9 13h6M9 17h4\"><\u002Fpath><\u002Fsvg>\n                CALL SUMMARY\n              <\u002Fdiv>\n              <sc-if value=\"{{ summaryReady }}\" hint-placeholder-val=\"{{ true }}\">\n                <p style=\"margin:0;font-size:14px;line-height:1.72;color:#C9C9D1;text-wrap:pretty\">{{ summary }}<\u002Fp>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ summaryLoading }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"display:flex;flex-direction:column;gap:9px\">\n                  <div style=\"height:11px;border-radius:5px;background:linear-gradient(90deg,#131318,#1d1d26,#131318);background-size:440px 100%;animation:pdShimmer 1.3s linear infinite;width:100%\"><\u002Fdiv>\n                  <div style=\"height:11px;border-radius:5px;background:linear-gradient(90deg,#131318,#1d1d26,#131318);background-size:440px 100%;animation:pdShimmer 1.3s linear infinite;width:90%\"><\u002Fdiv>\n                  <div style=\"height:11px;border-radius:5px;background:linear-gradient(90deg,#131318,#1d1d26,#131318);background-size:440px 100%;animation:pdShimmer 1.3s linear infinite;width:66%\"><\u002Fdiv>\n                  <p class=\"mono\" style=\"margin:6px 0 0;font-size:10px;letter-spacing:.1em;color:#56565E\">ANALYZING CONVERSATION…<\u002Fp>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n\n        <!-- FEEDBACK -->\n        <sc-if value=\"{{ showFeedback }}\" hint-placeholder-val=\"{{ false }}\">\n          <div class=\"pd-fbcol\" style=\"width:100%;background:rgba(255,255,255,.018);border:1px solid rgba(255,255,255,.07);border-radius:18px;padding:26px;display:flex;flex-direction:column;animation:pdRise .45s ease .08s both\">\n            <p class=\"mono\" style=\"margin:0 0 4px;font-size:10px;letter-spacing:.18em;color:#6E6E78\">YOUR FEEDBACK<\u002Fp>\n            <p style=\"margin:0 0 16px;font-size:17px;font-weight:600;color:#EDEDF2\">How was your conversation?<\u002Fp>\n            <div style=\"display:flex;gap:10px;margin-bottom:20px\">\n              <sc-for list=\"{{ stars }}\" as=\"s\" hint-placeholder-count=\"5\">\n                <button class=\"pd-star\" onclick=\"{{ s.onClick }}\" style=\"transition:transform .12s;background:none;border:none;cursor:pointer;padding:0;line-height:1\">\n                  <svg width=\"28\" height=\"28\" viewBox=\"0 0 24 24\" fill=\"{{ s.fill }}\" stroke=\"{{ s.stroke }}\" stroke-width=\"1.4\"><path d=\"M12 2l2.9 6.26 6.6.86-4.9 4.6 1.27 6.78L12 17.9 6.13 20.5 7.4 13.72 2.5 9.12l6.6-.86L12 2z\"><\u002Fpath><\u002Fsvg>\n                <\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <label class=\"mono\" style=\"font-size:10px;font-weight:500;letter-spacing:.12em;color:#6E6E78;margin-bottom:8px\">TELL US MORE <span style=\"color:#4a4a52\">(OPTIONAL)<\u002Fspan><\u002Flabel>\n            <textarea placeholder=\"What went well? What could be better?\" value=\"{{ feedbackText }}\" onchange=\"{{ onFeedback }}\" style=\"width:100%;background:#131318;border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:12px 14px;color:#E9E9EE;font-size:14px;outline:none;resize:vertical;min-height:84px;transition:all .15s;font-family:'Helvetica Neue',Arial,sans-serif;margin-bottom:14px\"><\u002Ftextarea>\n            <label style=\"display:flex;align-items:center;gap:10px;cursor:pointer;margin-bottom:16px\" onclick=\"{{ toggleAnon }}\">\n              <span style=\"width:18px;height:18px;border-radius:5px;border:1px solid {{ anonBorder }};background:{{ anonBg }};display:flex;align-items:center;justify-content:center;flex:none;transition:all .15s\">\n                <svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#0A0A0D\" stroke-width=\"3.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"opacity:{{ anonCheck }}\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n              <\u002Fspan>\n              <span style=\"font-size:13px;color:#9A9AA3\">Submit anonymously<\u002Fspan>\n            <\u002Flabel>\n            <sc-if value=\"{{ showIdentity }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"display:flex;flex-direction:column;gap:10px;margin-bottom:16px\">\n                <input placeholder=\"Your name (optional)\" value=\"{{ userName }}\" onchange=\"{{ onName }}\" style=\"width:100%;background:#131318;border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:12px 14px;color:#E9E9EE;font-size:14px;outline:none;transition:all .15s;font-family:'Helvetica Neue',Arial,sans-serif\">\n                <input placeholder=\"Your email (optional)\" value=\"{{ userEmail }}\" onchange=\"{{ onEmail }}\" style=\"width:100%;background:#131318;border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:12px 14px;color:#E9E9EE;font-size:14px;outline:none;transition:all .15s;font-family:'Helvetica Neue',Arial,sans-serif\">\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <div class=\"pd-fbrow\" style=\"display:flex;gap:11px\">\n              <button class=\"pd-sec\" onclick=\"{{ startOver }}\">Back to agents<\u002Fbutton>\n              <button class=\"pd-prim\" onclick=\"{{ submitFeedback }}\" style=\"flex:1\">Submit feedback<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- SUBMITTED -->\n        <sc-if value=\"{{ isSubmitted }}\" hint-placeholder-val=\"{{ false }}\">\n          <div class=\"pd-fbcol\" style=\"width:100%;background:rgba(255,255,255,.018);border:1px solid rgba(255,255,255,.07);border-radius:18px;padding:34px 26px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:8px;animation:pdRise .4s ease both\">\n            <div style=\"width:50px;height:50px;border-radius:50%;background:rgba(62,207,142,.1);border:1px solid rgba(62,207,142,.35);display:flex;align-items:center;justify-content:center;color:#3ECF8E\">\n              <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n            <p style=\"margin:8px 0 0;font-size:17px;font-weight:600;color:#EDEDF2\">Thank you for your feedback<\u002Fp>\n            <p style=\"margin:0 0 12px;font-size:13.5px;color:#9A9AA3;line-height:1.6;max-width:300px\">We appreciate you trying the demo. Your input goes straight to our product team.<\u002Fp>\n            <button class=\"pd-prim\" onclick=\"{{ startOver }}\">Back to agents<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fmain>\n\n  <!-- BEFORE-YOU-START MODAL -->\n  <sc-if value=\"{{ showStartModal }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeStart }}\" style=\"position:fixed;inset:0;background:rgba(5,5,8,.74);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:100;padding:22px;animation:pdRise .25s ease both\">\n      <div onclick=\"{{ stop }}\" style=\"width:100%;max-width:430px;background:#0D0D11;border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:28px 30px;display:flex;flex-direction:column;gap:18px;box-shadow:0 40px 110px -30px rgba(0,0,0,.85)\">\n        <div style=\"display:flex;justify-content:space-between;align-items:center\">\n          <span class=\"mono\" style=\"display:flex;align-items:center;gap:9px;font-size:11px;letter-spacing:.16em;color:#9A9AA3\">\n            <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#7CB8F7\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 16v-4M12 8h.01\"><\u002Fpath><\u002Fsvg>\n            BEFORE YOU START\n          <\u002Fspan>\n          <button class=\"pd-close\" onclick=\"{{ closeStart }}\" style=\"transition:all .15s;background:none;border:none;color:#6E6E78;cursor:pointer;padding:6px;border-radius:8px;display:flex\">\n            <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\"><path d=\"M18 6 6 18M6 6l12 12\"><\u002Fpath><\u002Fsvg>\n          <\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:13px\">\n          <sc-for list=\"{{ startSteps }}\" as=\"st\" hint-placeholder-count=\"3\">\n            <div style=\"display:flex;gap:13px;align-items:flex-start\">\n              <span class=\"mono\" style=\"flex:none;width:25px;height:25px;border-radius:7px;background:rgba(124,184,247,.1);color:#7CB8F7;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600\">{{ st.n }}<\u002Fspan>\n              <span style=\"font-size:14px;color:#C9C9D1;line-height:1.55\">{{ st.text }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <button class=\"pd-prim\" onclick=\"{{ proceed }}\" style=\"width:100%\">Proceed\n          <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg>\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- CONTACT MODAL -->\n  <sc-if value=\"{{ showContact }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeContact }}\" style=\"position:fixed;inset:0;background:rgba(5,5,8,.74);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:100;padding:22px;animation:pdRise .25s ease both\">\n      <div onclick=\"{{ stop }}\" style=\"width:100%;max-width:480px;background:#0D0D11;border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:28px 30px;display:flex;flex-direction:column;gap:14px;box-shadow:0 40px 110px -30px rgba(0,0,0,.85);max-height:88vh;overflow-y:auto\">\n        <div style=\"display:flex;justify-content:space-between;align-items:center\">\n          <span class=\"mono\" style=\"display:flex;align-items:center;gap:9px;font-size:11px;letter-spacing:.16em;color:#9A9AA3\">\n            <sc-if value=\"{{ contactSent }}\" hint-placeholder-val=\"{{ false }}\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#3ECF8E\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fsc-if>\n            {{ contactTitleU }}\n          <\u002Fspan>\n          <button class=\"pd-close\" onclick=\"{{ closeContact }}\" style=\"transition:all .15s;background:none;border:none;color:#6E6E78;cursor:pointer;padding:6px;border-radius:8px;display:flex\">\n            <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\"><path d=\"M18 6 6 18M6 6l12 12\"><\u002Fpath><\u002Fsvg>\n          <\u002Fbutton>\n        <\u002Fdiv>\n        <sc-if value=\"{{ contactSent }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"text-align:center;padding:14px 0 6px\">\n            <p style=\"margin:0;font-size:14px;color:#C9C9D1;line-height:1.7\">Thanks for reaching out. Our team will get back to you within one business day.<\u002Fp>\n            <button class=\"pd-prim\" onclick=\"{{ closeContact }}\" style=\"margin-top:20px\">Close<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ contactForm }}\" hint-placeholder-val=\"{{ true }}\">\n          <p style=\"margin:0 0 4px;font-size:13px;color:#9A9AA3;line-height:1.55\">Tell us a little about your needs and we'll be in touch.<\u002Fp>\n          <div style=\"display:flex;flex-direction:column;gap:13px\">\n            <div style=\"display:flex;gap:12px;flex-wrap:wrap\">\n              <div style=\"flex:1;min-width:150px;display:flex;flex-direction:column;gap:6px\">\n                <label class=\"mono\" style=\"font-size:9.5px;letter-spacing:.12em;color:#6E6E78\">NAME *<\u002Flabel>\n                <input placeholder=\"Your full name\" style=\"width:100%;background:#131318;border:1px solid rgba(255,255,255,.12);border-radius:9px;padding:11px 13px;color:#E9E9EE;font-size:14px;outline:none;transition:all .15s;font-family:'Helvetica Neue',Arial,sans-serif\">\n              <\u002Fdiv>\n              <div style=\"flex:1;min-width:150px;display:flex;flex-direction:column;gap:6px\">\n                <label class=\"mono\" style=\"font-size:9.5px;letter-spacing:.12em;color:#6E6E78\">WORK EMAIL *<\u002Flabel>\n                <input type=\"email\" placeholder=\"you@company.com\" style=\"width:100%;background:#131318;border:1px solid rgba(255,255,255,.12);border-radius:9px;padding:11px 13px;color:#E9E9EE;font-size:14px;outline:none;transition:all .15s;font-family:'Helvetica Neue',Arial,sans-serif\">\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:12px;flex-wrap:wrap\">\n              <div style=\"flex:1;min-width:150px;display:flex;flex-direction:column;gap:6px\">\n                <label class=\"mono\" style=\"font-size:9.5px;letter-spacing:.12em;color:#6E6E78\">PHONE <span style=\"color:#4a4a52\">(OPT)<\u002Fspan><\u002Flabel>\n                <input placeholder=\"+1 555 000 0000\" style=\"width:100%;background:#131318;border:1px solid rgba(255,255,255,.12);border-radius:9px;padding:11px 13px;color:#E9E9EE;font-size:14px;outline:none;transition:all .15s;font-family:'Helvetica Neue',Arial,sans-serif\">\n              <\u002Fdiv>\n              <div style=\"flex:1;min-width:150px;display:flex;flex-direction:column;gap:6px\">\n                <label class=\"mono\" style=\"font-size:9.5px;letter-spacing:.12em;color:#6E6E78\">COMPANY <span style=\"color:#4a4a52\">(OPT)<\u002Fspan><\u002Flabel>\n                <input placeholder=\"Company name\" style=\"width:100%;background:#131318;border:1px solid rgba(255,255,255,.12);border-radius:9px;padding:11px 13px;color:#E9E9EE;font-size:14px;outline:none;transition:all .15s;font-family:'Helvetica Neue',Arial,sans-serif\">\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:6px\">\n              <label class=\"mono\" style=\"font-size:9.5px;letter-spacing:.12em;color:#6E6E78\">WHAT ARE YOU LOOKING FOR? <span style=\"color:#4a4a52\">(OPT)<\u002Fspan><\u002Flabel>\n              <textarea placeholder=\"Use cases, call volume, timeline…\" style=\"width:100%;background:#131318;border:1px solid rgba(255,255,255,.12);border-radius:9px;padding:11px 13px;color:#E9E9EE;font-size:14px;outline:none;resize:vertical;min-height:84px;transition:all .15s;font-family:'Helvetica Neue',Arial,sans-serif\"><\u002Ftextarea>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:11px;margin-top:6px\">\n            <button class=\"pd-sec\" onclick=\"{{ closeContact }}\">Cancel<\u002Fbutton>\n            <button class=\"pd-prim\" onclick=\"{{ sendContact }}\" style=\"flex:1\">Submit<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- DEMO STATE NAVIGATOR -->\n  <div class=\"pd-nav\" style=\"position:fixed;left:14px;bottom:14px;z-index:120;display:flex;flex-direction:column;gap:9px;background:rgba(13,13,17,.9);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:12px 13px;box-shadow:0 20px 50px -20px rgba(0,0,0,.7);max-width:216px\">\n    <span class=\"mono\" style=\"font-size:9px;letter-spacing:.18em;color:#56565E\">PREVIEW STATES<\u002Fspan>\n    <div style=\"display:flex;flex-wrap:wrap;gap:5px\">\n      <sc-for list=\"{{ navStates }}\" as=\"n\" hint-placeholder-count=\"6\">\n        <button class=\"pd-pill mono\" onclick=\"{{ n.onClick }}\" style=\"transition:all .15s;background:{{ n.bg }};border:1px solid {{ n.border }};color:{{ n.fg }};border-radius:7px;padding:6px 10px;font-size:10px;letter-spacing:.06em;font-weight:500;cursor:pointer\">{{ n.label }}<\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;clientName&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Acme Financial&quot;,&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.agents = [\n      { name:\"Aria\", objective:\"Collections & Recovery\", color:\"blue\",\n        desc:\"Empathetic, compliant outreach for early-stage delinquencies — sets up flexible payment arrangements.\" },\n      { name:\"Max\", objective:\"Sales Qualification\", color:\"emerald\",\n        desc:\"Qualifies inbound leads, answers product questions, and books meetings with your team, 24/7.\" },\n      { name:\"Sol\", objective:\"Appointments & Reminders\", color:\"violet\",\n        desc:\"Confirms, reschedules, and sends reminders — keeps your calendar full and no-shows low.\" }\n    ];\n    this.summaries = {\n      Aria:\"Jordan reached out about an outstanding balance and asked to arrange a flexible repayment plan. Aria verified the account, presented monthly options, and the customer agreed to proceed. A confirmation email will follow. The conversation stayed positive and resolved on first contact.\",\n      Max:\"The caller was evaluating Predixion for outbound sales and asked about pricing and integrations. Max answered the product questions, confirmed a strong fit, and booked a follow-up demo with the sales team for next week.\",\n      Sol:\"The customer called to move an upcoming appointment. Sol located the booking, offered nearby openings, and rescheduled to the customer's preferred time. A calendar invite and reminder were sent automatically.\"\n    };\n    this.startSteps = [\n      { n:\"1\", text:\"Allow microphone access when your browser prompts you.\" },\n      { n:\"2\", text:\"Close other apps that may be using your microphone.\" },\n      { n:\"3\", text:\"Find a quiet space — voice quality depends on your connection.\" }\n    ];\n    this.accents = {\n      blue:\"#7CB8F7\", emerald:\"#6EE7B7\", violet:\"#C4B5FD\", amber:\"#FCD34D\", rose:\"#F9A8D4\", cyan:\"#67E8F9\"\n    };\n    this.state = {\n      view:\"app\", flow:\"landing\", overlay:\"none\", contactSent:false,\n      clientName:(props.clientName || \"Acme Financial\"),\n      passcode:\"\", passcodeError:false, agentIdx:0,\n      speaking:false, seconds:0, summaryReady:false,\n      rating:0, feedbackText:\"\", anonymous:false, userName:\"\", userEmail:\"\"\n    };\n  }\n  componentDidMount(){\n    // smooth fade-in only when arriving via a theme switch (direct loads stay fully visible)\n    if (sessionStorage.getItem(\"pdThemeFade\")) {\n      sessionStorage.removeItem(\"pdThemeFade\");\n      const r = document.querySelector('[data-screen-label]');\n      if (r) {\n        r.style.opacity = \"0\";\n        r.style.transition = \"opacity .42s ease\";\n        requestAnimationFrame(() => requestAnimationFrame(() => { r.style.opacity = \"1\"; }));\n        setTimeout(() => { r.style.opacity = \"1\"; }, 700);\n      }\n    }\n    this._ac = null;\n    this._click = (e) => {\n      const t = e.target && e.target.closest && e.target.closest(\"button, .pd-pill, .pd-star\");\n      if (!t) return;\n      try {\n        const AC = window.AudioContext || window.webkitAudioContext;\n        if (!AC) return;\n        if (!this._ac) this._ac = new AC();\n        const ac = this._ac;\n        if (ac.state === \"suspended\") ac.resume();\n        const now = ac.currentTime;\n        const dur = 0.05;\n        const buf = ac.createBuffer(1, Math.max(1, Math.floor(ac.sampleRate * dur)), ac.sampleRate);\n        const ch = buf.getChannelData(0);\n        for (let i = 0; i < ch.length; i++) ch[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / ch.length, 3.2);\n        const src = ac.createBufferSource(); src.buffer = buf;\n        const bp = ac.createBiquadFilter(); bp.type = \"bandpass\"; bp.frequency.value = 1250; bp.Q.value = 0.55;\n        const lp = ac.createBiquadFilter(); lp.type = \"lowpass\"; lp.frequency.value = 2400;\n        const ng = ac.createGain();\n        ng.gain.setValueAtTime(0.085, now);\n        ng.gain.exponentialRampToValueAtTime(0.0001, now + 0.055);\n        src.connect(bp); bp.connect(lp); lp.connect(ng); ng.connect(ac.destination);\n        src.start(now);\n        const o = ac.createOscillator(); o.type = \"sine\";\n        o.frequency.setValueAtTime(190, now);\n        o.frequency.exponentialRampToValueAtTime(146, now + 0.05);\n        const g = ac.createGain();\n        g.gain.setValueAtTime(0.0001, now);\n        g.gain.exponentialRampToValueAtTime(0.055, now + 0.007);\n        g.gain.exponentialRampToValueAtTime(0.0001, now + 0.1);\n        o.connect(g); g.connect(ac.destination);\n        o.start(now); o.stop(now + 0.1);\n      } catch (_) { /* audio unavailable */ }\n    };\n    document.addEventListener(\"pointerdown\", this._click, true);\n  }\n  componentWillUnmount(){\n    this._clear();\n    if (this._click) document.removeEventListener(\"pointerdown\", this._click, true);\n    if (this._ac && this._ac.close) { try { this._ac.close(); } catch (_) {} }\n  }\n  _clear(){ clearInterval(this._tick); clearInterval(this._spk2); clearTimeout(this._sum); }\n\n  fmt(s){ const m=Math.floor(s/60), ss=s%60; return `${m}:${String(ss).padStart(2,\"0\")}`; }\n\n  startCall = () => {\n    this._clear();\n    this.setState({ view:\"app\", overlay:\"none\", flow:\"live\", speaking:true, seconds:0, summaryReady:false });\n    this._tick = setInterval(()=> this.setState(s=>({ seconds:s.seconds+1 })), 1000);\n    // toggle speaking/listening to animate orb naturally (no transcript)\n    this._spk2 = setInterval(()=> this.setState(s=>({ speaking:!s.speaking })), 2600);\n  };\n  endCall = () => {\n    this._clear();\n    this.setState({ flow:\"ended\", speaking:false, summaryReady:false });\n    this._sum = setTimeout(()=> this.setState({ summaryReady:true }), 2200);\n  };\n  startOver = () => {\n    this._clear();\n    this.setState({ view:\"app\", overlay:\"none\", flow:\"landing\", speaking:false, seconds:0, summaryReady:false,\n      rating:0, feedbackText:\"\", anonymous:false, userName:\"\", userEmail:\"\" });\n  };\n  talk = (i) => this.setState({ agentIdx:i, overlay:\"start\" });\n  gotoSummary = () => {\n    this._clear();\n    this.setState({ view:\"app\", overlay:\"none\", flow:\"ended\", agentIdx:0, seconds:152, summaryReady:true,\n      rating:0, feedbackText:\"\", anonymous:false });\n  };\n  submitFeedback = () => this.setState({ flow:\"submitted\" });\n  _submitPass(){\n    if(this.state.passcode.trim().length>0) this.setState({view:\"app\",flow:\"landing\",passcodeError:false});\n    else this.setState({passcodeError:true});\n  }\n\n  renderVals(){\n    const s=this.state;\n    const ag=this.agents[s.agentIdx]||this.agents[0];\n    const isApp=s.view===\"app\";\n    const isLanding=isApp&&s.flow===\"landing\";\n    const isLive=isApp&&s.flow===\"live\";\n    const isEnded=isApp&&s.flow===\"ended\";\n    const isSubmitted=isApp&&s.flow===\"submitted\";\n    const isCall=isLive||isEnded||isSubmitted;\n\n    let orbMode=\"\";\n    if(isLive) orbMode=s.speaking?\"speaking\":\"\";\n    else if(isEnded||isSubmitted) orbMode=\"calm\";\n    const orbClass=`pd-orb orb-${ag.color} ${orbMode}`.trim();\n\n    const chip=(c)=>({accent:this.accents[c],\n      chipBg:`color-mix(in srgb, ${this.accents[c]} 12%, transparent)`,\n      chipBorder:`color-mix(in srgb, ${this.accents[c]} 28%, transparent)`});\n\n    const agentCards=this.agents.map((a,i)=>({\n      orbClass:`pd-orb sm orb-${a.color}`,\n      name:a.name, objectiveU:a.objective.toUpperCase(), desc:a.desc,\n      onTalk:()=>this.talk(i), ...chip(a.color)\n    }));\n\n    const stars=[1,2,3,4,5].map(n=>({\n      fill:s.rating>=n?\"#F0B35B\":\"none\", stroke:s.rating>=n?\"#F0B35B\":\"#33333b\",\n      onClick:()=>this.setState({rating:n})\n    }));\n\n    const mk=(label,active,onClick)=>({label,onClick,\n      bg:active?\"rgba(124,184,247,.16)\":\"rgba(255,255,255,.02)\",\n      border:active?\"rgba(124,184,247,.34)\":\"rgba(255,255,255,.08)\",\n      fg:active?\"#EDEDF2\":\"#9A9AA3\"});\n    const navStates=[\n      mk(\"LANDING\",isLanding,this.startOver),\n      mk(\"LIVE\",isLive,()=>{this.setState({agentIdx:0});this.startCall();}),\n      mk(\"SUMMARY\",isEnded,this.gotoSummary),\n      mk(\"PASSCODE\",s.view===\"passcode\",()=>{this._clear();this.setState({view:\"passcode\",overlay:\"none\",passcode:\"\",passcodeError:false});}),\n      mk(\"LOADING\",s.view===\"loading\",()=>{this._clear();this.setState({view:\"loading\",overlay:\"none\"});}),\n      mk(\"ERROR\",s.view===\"error\",()=>{this._clear();this.setState({view:\"error\",overlay:\"none\"});})\n    ];\n\n    return {\n      clientName:s.clientName,\n      clientInitials:(s.clientName||\"\").trim().split(/\\s+/).slice(0,2).map(w=>w[0]||\"\").join(\"\").toUpperCase() || \"–\",\n      isLoading:s.view===\"loading\", isError:s.view===\"error\", isPasscode:s.view===\"passcode\",\n      isLanding, isCall, isLive, isEnded, isSubmitted,\n      agentCards,\n      orbClass, agentName:ag.name, agentObjectiveU:ag.objective.toUpperCase(), ...chip(ag.color),\n      callWrapClass: isEnded ? \"pd-callwrap pd-twocol\" : \"pd-callwrap\",\n      liveStatusU: s.speaking ? (ag.name.toUpperCase()+\" IS SPEAKING\") : \"LISTENING…\",\n      timer:this.fmt(s.seconds), endCall:this.endCall,\n      summaryReady:isEnded&&s.summaryReady, summaryLoading:isEnded&&!s.summaryReady,\n      summary:this.summaries[ag.name]||\"\",\n      showFeedback:isEnded,\n      stars, feedbackText:s.feedbackText, onFeedback:e=>this.setState({feedbackText:e.target.value}),\n      toggleAnon:()=>this.setState(p=>({anonymous:!p.anonymous})), showIdentity:!s.anonymous,\n      anonBg:s.anonymous?\"#ECECF1\":\"#131318\", anonBorder:s.anonymous?\"#ECECF1\":\"#33333b\", anonCheck:s.anonymous?1:0,\n      userName:s.userName, onName:e=>this.setState({userName:e.target.value}),\n      userEmail:s.userEmail, onEmail:e=>this.setState({userEmail:e.target.value}),\n      submitFeedback:this.submitFeedback, startOver:this.startOver,\n      passcode:s.passcode, passcodeError:s.passcodeError,\n      onPasscode:e=>this.setState({passcode:e.target.value,passcodeError:false}),\n      onPasscodeKey:e=>{if(e.key===\"Enter\")this._submitPass();},\n      submitPasscode:()=>this._submitPass(),\n      retry:()=>this.setState({view:\"app\",flow:\"landing\"}),\n      startSteps:this.startSteps,\n      goTheme:(e)=>{\n        e.preventDefault();\n        const href = e.currentTarget.getAttribute(\"href\");\n        try { sessionStorage.setItem(\"pdThemeFade\", \"1\"); } catch (_) {}\n        const root = document.querySelector('[data-screen-label]') || document.documentElement;\n        root.style.transition = \"opacity .26s ease\";\n        root.style.opacity = \"0\";\n        setTimeout(()=>{ window.location.href = href; }, 240);\n      },\n      showStartModal:s.overlay===\"start\", closeStart:()=>this.setState({overlay:\"none\"}), proceed:this.startCall,\n      showContact:false, openContact:()=>{\n        const subject=encodeURIComponent(\"AI Voice Agents — Demo Inquiry\");\n        const body=encodeURIComponent(\"Hi Harshal,\\n\\nI just tried the Predixion AI voice demo and I'd like to learn more about AI voice agents for our business.\\n\\nA bit about us:\\n- Company:\\n- Use case(s):\\n- Approx. call volume:\\n- Timeline:\\n\\nThanks!\");\n        window.location.href=`mailto:harshal@predixion.ai?subject=${subject}&body=${body}`;\n      },\n      closeContact:()=>this.setState({overlay:\"none\",contactSent:false}),\n      contactSent:s.contactSent, contactForm:s.overlay===\"contact\"&&!s.contactSent,\n      contactTitleU:s.contactSent?\"MESSAGE SENT\":\"CONTACT US\", sendContact:()=>this.setState({contactSent:true}),\n      stop:e=>e.stopPropagation(),\n      navStates\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
