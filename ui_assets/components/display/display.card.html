<!-- @dsCard group="Components" viewport="700x150" name="Chips & Theme toggle" subtitle="accent badges + dark/light segmented toggle" -->
<!DOCTYPE html><html data-pd-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font-sans);padding:24px;display:flex;flex-wrap:wrap;gap:12px;align-items:center}</style></head>
<body>
  <span class="pd-chip" style="--acc:var(--pd-blue)">COLLECTIONS &amp; RECOVERY</span>
  <span class="pd-chip" style="--acc:var(--pd-emerald)">SALES QUALIFICATION</span>
  <span class="pd-chip" style="--acc:var(--pd-violet)">APPOINTMENTS &amp; REMINDERS</span>
  <div class="pd-toggle" style="margin-left:8px">
    <button aria-label="Light mode"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg></button>
    <button aria-pressed="true" aria-label="Dark mode"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg></button>
  </div>
</body></html>
