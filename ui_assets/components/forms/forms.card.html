<!-- @dsCard group="Components" viewport="700x230" name="Form controls" subtitle="input · textarea · star rating · status dot" -->
<!DOCTYPE html><html data-pd-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font-sans);padding:24px;display:flex;flex-direction:column;gap:14px;max-width:420px}
  .row{display:flex;align-items:center;gap:18px}
  .stars{display:flex;gap:10px}
</style></head>
<body>
  <input class="pd-input" placeholder="Your email (optional)">
  <textarea class="pd-textarea" placeholder="What went well? What could be better?"></textarea>
  <div class="row">
    <div class="stars">
      <span style="color:var(--pd-star)"><svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.9 6.26 6.6.86-4.9 4.6 1.27 6.78L12 17.9 6.13 20.5 7.4 13.72 2.5 9.12l6.6-.86L12 2z"/></svg></span>
      <span style="color:var(--pd-star)"><svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.9 6.26 6.6.86-4.9 4.6 1.27 6.78L12 17.9 6.13 20.5 7.4 13.72 2.5 9.12l6.6-.86L12 2z"/></svg></span>
      <span style="color:var(--pd-star)"><svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.9 6.26 6.6.86-4.9 4.6 1.27 6.78L12 17.9 6.13 20.5 7.4 13.72 2.5 9.12l6.6-.86L12 2z"/></svg></span>
      <span style="color:var(--pd-star)"><svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.9 6.26 6.6.86-4.9 4.6 1.27 6.78L12 17.9 6.13 20.5 7.4 13.72 2.5 9.12l6.6-.86L12 2z"/></svg></span>
      <span style="color:var(--star-empty)"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M12 2l2.9 6.26 6.6.86-4.9 4.6 1.27 6.78L12 17.9 6.13 20.5 7.4 13.72 2.5 9.12l6.6-.86L12 2z"/></svg></span>
    </div>
    <span style="display:inline-flex;align-items:center;gap:9px;font-family:var(--font-mono);font-size:13px;letter-spacing:.12em;color:var(--accent)"><span class="pd-status-dot"></span>1:52</span>
  </div>
</body></html>
